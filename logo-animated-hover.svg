<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#000000"/>
  <path id="flowPath" d="M140 120 C260 120 260 392 380 392" stroke="#FFFFFF" stroke-width="40" fill="none" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="1.4s" fill="freeze" begin="0s"/>
  </path>
  <circle cx="140" cy="120" r="14" fill="#FFFFFF">
    <animate attributeName="r" values="14;20;14" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="392" r="14" fill="#FFFFFF">
    <animate attributeName="r" values="14;20;14" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle r="9" fill="#FFFFFF">
    <animateMotion dur="1.8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#flowPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
